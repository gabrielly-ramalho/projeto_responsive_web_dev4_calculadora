<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora da Gaby</title>
</head>
<body>
    
    <div class="calculadora">
        <div class="resultado">0</div>
        <div class="botoes">
            <button class="bt_topo">C</button>
            <button class="bt_topo">±</button> 
            <button class="bt_topo">%</button> 
            <button class="bt_topo">÷</button>
       
            <button class="bt_calc">7</button>
            <button class="bt_calc">8</button>
            <button class="bt_calc">9</button>
            <button class="bt_opera">x</button>
                
            <button class="bt_calc">4</button>
            <button class="bt_calc">5</button>
            <button class="bt_calc">6</button>
            <button class="bt_opera">-</button>

            <button class="bt_calc">1</button>
            <button class="bt_calc">2</button>
            <button class="bt_calc">3</button>
            <button class="bt_opera">+</button>

            <button class="bt_zero">0</button>
            <button class="bt_calc">,</button>
            <button class="bt_opera">=</button>
            
               

        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
